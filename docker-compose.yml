version: "3.9"
services:
  db:
    image: postgres:16-alpine
    container_name: nyx_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nyxdb
    ports:
      - "5432:5432"
    volumes:
      - nyx_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nyxdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: nyx_api
    env_file:
      - apps/api/.env.example
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api:/app
      - /app/node_modules

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: nyx_web
    environment:
      - VITE_API_URL=http://localhost:4000
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules

volumes:
  nyx_pgdata:
