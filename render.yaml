services:
  - type: web
    name: nyx-api
    env: docker
    dockerfilePath: docker/api.Dockerfile
    dockerContext: .
    plan: starter
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: CORS_ORIGIN
        value: https://mbr.nyxagency.com
      - key: DATABASE_URL
        fromDatabase:
          name: nyx-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d

  - type: web
    name: nyx-web
    env: docker
    dockerfilePath: docker/web.Dockerfile
    dockerContext: .
    plan: starter
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://nyx-api.onrender.com

databases:
  - name: nyx-db
    databaseName: nyxdb
    user: nyx
